<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- ── Base styles to prevent flash of unstyled content ─────── -->

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        background: #020408;
        color: #c8ffe0;
        overflow-x: hidden;

      /* Prevent layout shift while fonts load */
      * { box-sizing: border-box; }
